name: "Save LTO Cache"
description: "Save LTO linker cache (/dev/shm/ldcache) to GitHub Release"

inputs:
  asset-name:
    description: "Release asset filename, e.g. lto-data-6.1-VANILLA-NEUTRON-THIN-main.tar.zst"
    required: true
  gh-token:
    required: true

runs:
  using: composite
  steps:
    - name: "💾 Save LTO cache to Release"
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        # Same reasoning as save-caches: no write-scoped token means
        # release create/upload can't succeed, so skip cleanly instead of
        # hard-failing after 3 retries.
        if [ -z "${GH_TOKEN:-}" ]; then
          echo "⚠️ No gh-token provided — skipping LTO cache save (expected on forks without PERSONAL_TOKEN)"
          exit 0
        fi

        ASSET_NAME="${{ inputs.asset-name }}"

        if [ ! -d /dev/shm/ldcache ]; then
          echo "⚠️ /dev/shm/ldcache not found — skipping save"
          exit 0
        fi

        echo "Compressing LTO cache..."
        sudo tar --zstd -cf "/tmp/${ASSET_NAME}" -C / dev/shm/ldcache || {
          echo "❌ Failed to compress LTO cache"
          exit 1
        }

        SIZE=$(stat -c%s "/tmp/${ASSET_NAME}" 2>/dev/null || echo 0)
        SIZE_MB=$((SIZE / 1024 / 1024))
        if [ "$SIZE_MB" -gt 2000 ]; then
          echo "❌ LTO cache too large (${SIZE_MB}MB > 2000MB limit) — skipping save"
          sudo rm -f "/tmp/${ASSET_NAME}"
          exit 1
        fi
        echo "✅ LTO cache size: ${SIZE_MB}MB"

        # All matrix variants upload to this same shared "cache" release at
        # roughly the same time. A single attempt can stall or get rejected
        # under that contention, so retry with backoff instead of failing
        # (or hanging) on the first attempt.
        for i in 1 2 3; do
          gh release view cache --repo "${{ github.repository }}" > /dev/null 2>&1 && break
          gh release create cache \
            --repo "${{ github.repository }}" \
            --title "Cache Storage" \
            --notes "Automated cache storage for Luminaire build tools" \
            --prerelease && break
          echo "⚠️ Attempt ${i}/3 to ensure cache release exists failed — retrying in $((i * 5))s..."
          sleep $((i * 5))
          if [ "$i" -eq 3 ]; then
            echo "❌ Failed to create cache release"
            sudo rm -f "/tmp/${ASSET_NAME}"
            exit 1
          fi
        done

        echo "Uploading LTO cache asset..."
        for i in 1 2 3; do
          gh release upload cache "/tmp/${ASSET_NAME}" \
            --repo "${{ github.repository }}" \
            --clobber && break
          echo "⚠️ Attempt ${i}/3 to upload LTO cache failed — retrying in $((i * 5))s..."
          sleep $((i * 5))
          if [ "$i" -eq 3 ]; then
            echo "❌ Failed to upload LTO cache"
            sudo rm -f "/tmp/${ASSET_NAME}"
            exit 1
          fi
        done

        sudo rm -f "/tmp/${ASSET_NAME}"
        echo "LTO cache saved ✅"
