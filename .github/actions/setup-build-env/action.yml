name: "Setup Build Environment"
description: "Restore-only: clang, arsenal, ccache, and LTO caches for Start-Build job"

inputs:
  build-system:
    required: true
  kernel-version:
    required: true
  ref-name:
    required: true
  kernel-variant:
    required: true
  susfs:
    required: true
  lto-mode:
    required: true
  gh-token:
    required: true

outputs:
  clang-variant:
    description: "Stripped clang variant name (e.g. Cirrus, Neutron)"
    value: ${{ steps.clang-key.outputs.clang_variant }}

runs:
  using: composite
  steps:
    - name: "Derive Clang Variant"  # keep in sync with setup-arsenal
      id: clang-key
      if: startsWith(inputs.build-system, 'Make')
      shell: bash
      run: |
        variant="${{ inputs.build-system }}"
        variant="${variant#Make - }"
        echo "clang_variant=${variant}" >> $GITHUB_OUTPUT

    - name: "Restore Clang Cache"
      if: startsWith(inputs.build-system, 'Make')
      uses: actions/cache/restore@v6
      with:
        path: ~/clang-cache
        key: clang-${{ steps.clang-key.outputs.clang_variant }}

    - name: "Restore Arsenal Cache"
      uses: actions/cache/restore@v6
      with:
        path: |
          ~/ccache-bin
          ~/ak3-cache
          ~/kernel-cache
          ~/.apt-cache
        key: arsenal-${{ startsWith(inputs.build-system, 'Make') && 'MAKE' || 'KLEAF' }}-${{ inputs.kernel-version }}

    - name: "Restore ccache"
      if: startsWith(inputs.build-system, 'Make')
      uses: ./.github/actions/restore-caches
      with:
        # Must match the Save step's ccache-prefix in build.yml exactly
        # (same field order, same susfs handling) or restore silently
        # misses the asset the save step actually wrote.
        ccache-prefix: ${{ inputs.kernel-version }}-${{ inputs.kernel-variant }}${{ inputs.susfs == 'true' && '-susfs' || '' }}-${{ inputs.lto-mode != 'NONE' && format('{0}-', inputs.lto-mode) || '' }}${{ steps.clang-key.outputs.clang_variant }}-${{ inputs.ref-name }}-
        kernel-version: ${{ inputs.kernel-version }}
        gh-token: ${{ inputs.gh-token }}

    - name: "Restore LTO Cache"
      if: startsWith(inputs.build-system, 'Make') && inputs.lto-mode == 'THIN'
      uses: ./.github/actions/restore-lto-cache
      with:
        # Must match the Save step's lto-asset-name in build.yml exactly.
        # Includes susfs (a prior version of this didn't — see build.yml's
        # comment on the Save Build Caches step for why that was a bug).
        asset-name: ${{ inputs.kernel-version }}-${{ inputs.kernel-variant }}${{ inputs.susfs == 'true' && '-susfs' || '' }}-${{ inputs.lto-mode != 'NONE' && format('{0}-', inputs.lto-mode) || '' }}${{ steps.clang-key.outputs.clang_variant }}-${{ inputs.ref-name }}-lto.tar.zst
        gh-token:   ${{ inputs.gh-token }}
