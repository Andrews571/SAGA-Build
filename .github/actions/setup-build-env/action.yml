name: "Setup Build Environment"
description: "Restore-only: clang, arsenal, ccache, and LTO caches for Start-Build job"

inputs:
  build-system:
    required: true
  kernel-version:
    required: true
  ref-name:
    required: true
  root-solution:
    required: true
  susfs:
    required: true
  enable-lto:
    required: true
  gh-token:
    required: true

outputs:
  clang-variant:
    description: "Stripped clang variant name (e.g. Cirrus, Neutron)"
    value: ${{ steps.clang-key.outputs.clang_variant }}

runs:
  using: composite
  steps:
    - name: "Derive Clang Variant"  # keep in sync with setup-arsenal
      id: clang-key
      if: startsWith(inputs.build-system, 'Make')
      shell: bash
      run: |
        variant="${{ inputs.build-system }}"
        variant="${variant#Make - }"
        echo "clang_variant=${variant}" >> $GITHUB_OUTPUT

    - name: "Restore Clang Cache"
      if: startsWith(inputs.build-system, 'Make')
      uses: actions/cache/restore@v6
      with:
        path: ~/clang-cache
        key: clang-${{ steps.clang-key.outputs.clang_variant }}

    - name: "Restore Arsenal Cache"
      uses: actions/cache/restore@v6
      with:
        path: |
          ~/ccache-bin
          ~/ak3-cache
          ~/kernel-cache
          ~/.apt-cache
        key: arsenal-${{ startsWith(inputs.build-system, 'Make') && 'MAKE' || 'KLEAF' }}-${{ inputs.kernel-version }}-${{ inputs.ref-name }}

    - name: "Restore ccache"
      if: startsWith(inputs.build-system, 'Make')
      uses: ./.github/actions/restore-caches
      with:
        ccache-prefix: ccache-data-${{ inputs.root-solution }}${{ inputs.susfs == 'true' && '-susfs' || '' }}-${{ inputs.kernel-version }}-${{ inputs.enable-lto != 'NONE' && format('lto-{0}-', inputs.enable-lto) || '' }}${{ steps.clang-key.outputs.clang_variant }}-${{ inputs.ref-name }}-
        kernel-version: ${{ inputs.kernel-version }}
        gh-token: ${{ inputs.gh-token }}

    - name: "Restore LTO Cache"
      if: startsWith(inputs.build-system, 'Make') && inputs.enable-lto == 'THIN'
      uses: ./.github/actions/restore-lto-cache
      with:
        asset-name: lto-data-${{ inputs.kernel-version }}-${{ steps.clang-key.outputs.clang_variant }}-${{ inputs.root-solution }}-${{ inputs.ref-name }}-lto.tar.zst
        gh-token:   ${{ inputs.gh-token }}
