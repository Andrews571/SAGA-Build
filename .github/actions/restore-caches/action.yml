name: "Restore ccache"
description: "Restore ccache from GitHub Release"

inputs:
  ccache-prefix:
    required: true
  gh-token:
    required: true

runs:
  using: composite
  steps:
    - name: "♻️ Restore ccache from Release"
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        ASSET_NAME="${{ inputs.ccache-prefix }}ccache.tar.zst"
        cd "${{ github.workspace }}"
        gh release download cache \
          --repo "${{ github.repository }}" \
          --pattern "${ASSET_NAME}" \
          --dir /tmp/ 2>/dev/null || true
        if [ -f "/tmp/${ASSET_NAME}" ]; then
          tar --zstd -xf "/tmp/${ASSET_NAME}"
          rm -f "/tmp/${ASSET_NAME}"
        fi
