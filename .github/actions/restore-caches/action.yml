name: "Restore ccache"
description: "Restore ccache from GitHub Release"

inputs:
  ccache-filename:
    required: true
  gh-token:
    required: true
  kernel-version:
    required: true

runs:
  using: composite
  steps:
    - name: "♻️ Restore ccache from Release"
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        ASSET_NAME="${{ inputs.ccache-filename }}"
        cd "${{ github.workspace }}"

        # Try own release cache
        if gh release view cache --repo "${{ github.repository }}" > /dev/null 2>&1; then
          echo "Checking for ccache asset: ${ASSET_NAME}"
          if gh release download cache \
            --repo "${{ github.repository }}" \
            --pattern "${ASSET_NAME}" \
            --dir /tmp/ 2>/dev/null; then
            if [ -f "/tmp/${ASSET_NAME}" ]; then
              echo "Restoring ccache from ${ASSET_NAME}..."
              tar --zstd -xf "/tmp/${ASSET_NAME}" && {
                rm -f "/tmp/${ASSET_NAME}"
                echo "ccache restored ✅"
                exit 0
              } || {
                echo "❌ Failed to extract ccache — starting cold"
                rm -f "/tmp/${ASSET_NAME}"
                exit 0
              }
            fi
          fi
          echo "⚠️ ccache asset not found (${ASSET_NAME}) — starting cold"
          exit 0
        fi

        echo "⚠️ Cache release not found — starting cold"
