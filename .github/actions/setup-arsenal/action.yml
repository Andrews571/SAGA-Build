name: "Setup Arsenal"
description: "Restore clang + arsenal cache (auto-saved at end of job if missing) for prepare-matrix job"

inputs:
  build-system:
    required: true
  kernel-version:
    required: true
  update-arsenal:
    required: true
  gh-token:
    required: true

outputs:
  clang-variant:
    description: "Stripped clang variant name (e.g. Cirrus, Neutron)"
    value: ${{ steps.clang-key.outputs.clang_variant }}

runs:
  using: composite
  steps:
    - name: "Derive Clang Variant"  # keep in sync with setup-build-env
      id: clang-key
      if: startsWith(inputs.build-system, 'Make')
      shell: bash
      run: |
        variant="${{ inputs.build-system }}"
        variant="${variant#Make - }"
        echo "clang_variant=${variant}" >> $GITHUB_OUTPUT

    - name: "Force Refresh (delete old caches)"
      if: inputs.update-arsenal == 'yes'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        gh cache delete "arsenal-${{ startsWith(inputs.build-system, 'Make') && 'MAKE' || 'KLEAF' }}-${{ inputs.kernel-version }}" -R "${{ github.repository }}" 2>/dev/null || true
        if [ "${{ startsWith(inputs.build-system, 'Make') }}" = "true" ]; then
          gh cache delete "clang-${{ steps.clang-key.outputs.clang_variant }}" -R "${{ github.repository }}" 2>/dev/null || true
        fi

    - name: "Cache Clang"  # restores if present; auto-saves at end of job if it was missing
      if: startsWith(inputs.build-system, 'Make')
      uses: actions/cache@v6
      with:
        path: ~/clang-cache
        key: clang-${{ steps.clang-key.outputs.clang_variant }}

    - name: "Cache Arsenal"  # restores if present; auto-saves at end of job if it was missing
      uses: actions/cache@v6
      with:
        path: |
          ~/ccache-bin
          ~/ak3-cache
          ~/kernel-cache
          ~/.apt-cache
        key: arsenal-${{ startsWith(inputs.build-system, 'Make') && 'MAKE' || 'KLEAF' }}-${{ inputs.kernel-version }}

    - name: "Run Arsenal"
      shell: bash
      working-directory: ${{ github.workspace }}
      run: bash arsenal.sh
