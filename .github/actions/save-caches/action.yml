name: "Save Caches"
description: "Save arsenal to GH Cache, ccache to Release"

inputs:
  ccache-key:
    required: true
  ccache-prefix:
    required: true
  gh-token:
    required: true

runs:
  using: composite
  steps:
    - name: "💾 Save ccache to Release"
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        ASSET_NAME="${{ inputs.ccache-prefix }}ccache.tar.zst"
        cd "${{ github.workspace }}"
        tar --zstd -cf "/tmp/${ASSET_NAME}" .ccache/
        gh release upload cache "/tmp/${ASSET_NAME}" \
          --repo "${{ github.repository }}" \
          --clobber
        rm -f "/tmp/${ASSET_NAME}"

    - name: "🧹 Arsenal cleanup old caches"
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        CACHES=$(gh api \
          "/repos/${{ github.repository }}/actions/caches?per_page=100" \
          --jq ".actions_caches[] | select(.key | startswith(\"arsenal-${{ github.ref_name }}-\")) | select(.key != \"arsenal-${{ github.ref_name }}-${{ github.run_id }}\") | .id")
        if [ -n "$CACHES" ]; then
          for ID in $CACHES; do
            gh api --method DELETE "/repos/${{ github.repository }}/actions/caches/${ID}" || true
          done
        fi
