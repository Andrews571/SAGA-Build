name: "Save Caches"
description: "Save arsenal to GH Cache, ccache to Release"

inputs:
  ccache-prefix:
    required: true
  gh-token:
    required: true

runs:
  using: composite
  steps:
    - name: "💾 Save ccache to Release"
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        ASSET_NAME="${{ inputs.ccache-prefix }}ccache.tar.zst"
        cd "${{ github.workspace }}"
        tar --zstd -cf "/tmp/${ASSET_NAME}" .ccache/
        gh release view cache --repo "${{ github.repository }}" > /dev/null 2>&1 || \
          gh release create cache \
            --repo "${{ github.repository }}" \
            --title "Cache Storage" \
            --notes "Automated cache storage for Luminaire build tools" \
            --prerelease
        gh release upload cache "/tmp/${ASSET_NAME}" \
          --repo "${{ github.repository }}" \
          --clobber
        rm -f "/tmp/${ASSET_NAME}"
        
