name: "Save Caches"
description: "Save ccache to GH Release (arsenal itself is auto-saved by actions/cache in setup-arsenal on cache miss, not here)"

inputs:
  ccache-filename:
    required: true
  gh-token:
    required: true

runs:
  using: composite
  steps:
    - name: "💾 Save ccache to Release"
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        # No write-scoped token (expected on a fork without PERSONAL_TOKEN
        # configured) — release create/upload can't possibly succeed, so
        # skip instead of burning 3 retries into a hard failure. Restore
        # already degrades the same way; this just matches it on the save
        # side, so a fork with zero secrets gets a cold-but-green build
        # every run instead of a red one.
        if [ -z "${GH_TOKEN:-}" ]; then
          echo "⚠️ No gh-token provided — skipping ccache save (expected on forks without PERSONAL_TOKEN)"
          exit 0
        fi

        ASSET_NAME="${{ inputs.ccache-filename }}"
        cd "${{ github.workspace }}"
        
        # Check ccache exists
        if [ ! -d ".ccache" ]; then
          echo "⚠️ .ccache directory not found — skipping save"
          exit 0
        fi
        
        # Compress
        echo "Compressing ccache..."
        tar --zstd -cf "/tmp/${ASSET_NAME}" .ccache/ || {
          echo "❌ Failed to compress ccache"
          exit 1
        }
        
        # Check size
        SIZE=$(stat -f%z "/tmp/${ASSET_NAME}" 2>/dev/null || stat -c%s "/tmp/${ASSET_NAME}" 2>/dev/null || echo 0)
        SIZE_MB=$((SIZE / 1024 / 1024))
        
        if [ "$SIZE_MB" -gt 2000 ]; then
          echo "❌ ccache too large (${SIZE_MB}MB > 2000MB limit) — cleanup needed"
          rm -f "/tmp/${ASSET_NAME}"
          exit 1
        fi
        echo "✅ ccache size: ${SIZE_MB}MB"
        
        # All matrix variants upload to this same shared "cache" release at
        # roughly the same time. A single attempt can stall or get rejected
        # under that contention, so retry with backoff instead of failing
        # (or hanging) on the first attempt.
        for i in 1 2 3; do
          gh release view cache --repo "${{ github.repository }}" > /dev/null 2>&1 && break
          gh release create cache \
            --repo "${{ github.repository }}" \
            --title "Cache Storage" \
            --notes "Automated cache storage for SAGA build tools" \
            --prerelease && break
          echo "⚠️ Attempt ${i}/3 to ensure cache release exists failed — retrying in $((i * 5))s..."
          sleep $((i * 5))
          if [ "$i" -eq 3 ]; then
            echo "❌ Failed to create cache release"
            rm -f "/tmp/${ASSET_NAME}"
            exit 1
          fi
        done

        # Upload
        echo "Uploading ccache asset..."
        for i in 1 2 3; do
          gh release upload cache "/tmp/${ASSET_NAME}" \
            --repo "${{ github.repository }}" \
            --clobber && break
          echo "⚠️ Attempt ${i}/3 to upload ccache failed — retrying in $((i * 5))s..."
          sleep $((i * 5))
          if [ "$i" -eq 3 ]; then
            echo "❌ Failed to upload ccache"
            rm -f "/tmp/${ASSET_NAME}"
            exit 1
          fi
        done
        
        rm -f "/tmp/${ASSET_NAME}"
        echo "ccache saved ✅"
