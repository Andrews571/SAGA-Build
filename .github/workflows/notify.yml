name: "📡 Notify"

on:
  push:
    tags-ignore:
      - '**'   # ignore tag pushes (e.g. the "cache" release tag) — only real branch commits notify

jobs:

  # ======================================================
  # 📌 PUSH EVENT
  # ======================================================
  on-push:
    name: "Push"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: actions/checkout@v7

      - name: "📌 Notify Push"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_EVENT: ${{ vars.TELEGRAM_THREAD_ID_EVENT }}
          COMMIT:     ${{ github.sha }}
          BRANCH:     ${{ github.ref_name }}
          MESSAGE:    ${{ github.event.head_commit.message }}
          AUTHOR:     ${{ github.event.head_commit.author.name }}
          URL:        ${{ github.event.head_commit.url }}
        run: |
          source "$GITHUB_WORKSPACE/functions.sh"
          source "$GITHUB_WORKSPACE/release/telegram/config.sh"
          source "$GITHUB_WORKSPACE/release/telegram/common.sh"
          TELEGRAM_THREAD_ID="$TELEGRAM_THREAD_ID_EVENT"
          SHORT_COMMIT="${COMMIT:0:7}"
          TITLE=$(printf '%s' "$MESSAGE" | head -1)
          BODY=$(printf '%s' "$MESSAGE" | tail -n +3)

          html_escape() {
            printf '%s' "$1" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g; s/"/\&quot;/g'
          }

          TITLE_ESC=$(html_escape "$TITLE")
          BODY_ESC=$(html_escape "$BODY")
          AUTHOR_ESC=$(html_escape "$AUTHOR")

          TEXT=$(printf '📌 New Commit : <a href="%s">%s</a>\nBranch : <code>%s</code>\nAuthor : %s\n\nTitle:\n<i>%s</i>' \
            "$URL" "$SHORT_COMMIT" "$BRANCH" "$AUTHOR_ESC" "$TITLE_ESC")

          if [ -n "$BODY" ]; then
            TEXT=$(printf '%s\n\nMessage:\n<pre>%s</pre>' "$TEXT" "$BODY_ESC")
          fi

          if telegram_api_call "sendMessage" /tmp/tg_push_response.json "Push notify" \
                  -d "chat_id=${TELEGRAM_CHAT_ID}" \
                  -d "message_thread_id=${TELEGRAM_THREAD_ID}" \
                  -d "parse_mode=HTML" \
                  -d "disable_web_page_preview=true" \
                  --data-urlencode "text=${TEXT}"; then
              log "Notify sent ✅"
          fi
          rm -f /tmp/tg_push_response.json
