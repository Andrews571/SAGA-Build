name: "📡 Notify"

on:
  push:
  workflow_run:
    workflows:
      - "✨ Luminaire Protocol"
      - "🔥 Cache Warming"
      - "🌀 Sync Kernel Source"
    types:
      - completed

jobs:

  # ======================================================
  # 📌 PUSH EVENT
  # ======================================================
  on-push:
    name: "Push"
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: "📌 Notify Push"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID_EVENT }}
        run: |
          COMMIT="${{ github.sha }}"
          SHORT_COMMIT="${COMMIT:0:7}"
          BRANCH="${{ github.ref_name }}"
          MESSAGE="${{ github.event.head_commit.message }}"
          AUTHOR="${{ github.event.head_commit.author.name }}"
          URL="${{ github.event.head_commit.url }}"

          TITLE=$(echo "$MESSAGE" | head -1)
          BODY=$(echo "$MESSAGE" | tail -n +3)

          TEXT="📌 New Commit : <a href=\"${URL}\">${SHORT_COMMIT}</a>
Branch : <code>${BRANCH}</code>
Author : ${AUTHOR}

<b>${TITLE}</b>"

          if [ -n "$BODY" ]; then
            TEXT="${TEXT}

<pre>${BODY}</pre>"
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "message_thread_id=${TELEGRAM_THREAD_ID}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}" > /dev/null

  # ======================================================
  # ⚙️ WORKFLOW EVENT
  # ======================================================
  on-workflow:
    name: "Workflow"
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest

    steps:
      - name: "⚙️ Notify Workflow"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID_EVENT }}
        run: |
          WF_NAME="${{ github.event.workflow_run.name }}"
          WF_STATUS="${{ github.event.workflow_run.conclusion }}"
          WF_BRANCH="${{ github.event.workflow_run.head_branch }}"
          WF_URL="${{ github.event.workflow_run.html_url }}"
          WF_RUN="${{ github.event.workflow_run.run_number }}"

          if [ "$WF_STATUS" = "success" ]; then
            ICON="✅"
          else
            ICON="❌"
          fi

          TEXT="${ICON} Workflow : <a href=\"${WF_URL}\">${WF_NAME} #${WF_RUN}</a>
Branch : <code>${WF_BRANCH}</code>
Status : <code>${WF_STATUS}</code>"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "message_thread_id=${TELEGRAM_THREAD_ID}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}" > /dev/null
