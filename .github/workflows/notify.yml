name: "📡 Notify"

on:
  push:

jobs:

  # ======================================================
  # 📌 PUSH EVENT
  # ======================================================
  on-push:
    name: "Push"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: actions/checkout@v7

      - name: "📌 Notify Push"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          COMMIT:     ${{ github.sha }}
          BRANCH:     ${{ github.ref_name }}
          MESSAGE:    ${{ github.event.head_commit.message }}
          AUTHOR:     ${{ github.event.head_commit.author.name }}
          URL:        ${{ github.event.head_commit.url }}
        run: |
          source "$GITHUB_WORKSPACE/functions.sh"
          source "$GITHUB_WORKSPACE/release/telegram/config.sh"
          source "$GITHUB_WORKSPACE/release/telegram/common.sh"
          TELEGRAM_THREAD_ID="$TELEGRAM_THREAD_ID_EVENT"

          TITLE=$(printf '%s' "$MESSAGE" | head -1)
          BODY=$(printf '%s' "$MESSAGE" | tail -n +3)

          CAPTION_FILE="/tmp/telegram_push_caption.txt"
          BRANCH="$BRANCH" AUTHOR="$AUTHOR" COMMIT="$COMMIT" URL="$URL" TITLE="$TITLE" BODY="$BODY" \
            python3 "$GITHUB_WORKSPACE/release/telegram/caption.py" push "$CAPTION_FILE" \
            || error "Notify: caption builder failed!"

          TEXT="$(cat "$CAPTION_FILE")"
          rm -f "$CAPTION_FILE"

          if telegram_api_call "sendMessage" /tmp/tg_push_response.json "Push notify" \
                  -d "chat_id=${TELEGRAM_CHAT_ID}" \
                  -d "message_thread_id=${TELEGRAM_THREAD_ID}" \
                  -d "parse_mode=MarkdownV2" \
                  -d "disable_web_page_preview=true" \
                  --data-urlencode "text=${TEXT}"; then
              log "Notify sent ✅"
          fi
          rm -f /tmp/tg_push_response.json
