name: ⬆️ Upstream Kernel Sync

# Unlike sync-kernel.yml, this does not flatten/force-push a snapshot. The
# target repo (LuminaireKernel-{version}-lts) keeps real git history, so it
# can be merged against linux-stable to catch up on subversions ACK hasn't
# merged yet.
#
# Manual only for now (workflow_dispatch, no cron) — merge conflicts here
# need human judgment, not something safe to auto-resolve in CI.

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel version (e.g. 6.1)"
        type: string
        default: "6.1"
      android_version:
        description: "Android version tag (e.g. android14)"
        type: string
        default: "android14"
      target_stable_tag:
        description: "linux-stable tag to catch up to (e.g. v6.1.177). Leave empty to only sync with ACK."
        type: string
        default: ""
      force_adopt:
        description: "Force-reset the branch to live ACK history even if local history already exists (normally only needed once, on the first run)"
        type: boolean
        default: false

jobs:
  upstream-sync:
    name: "Sync ${{ inputs.android_version }}-${{ inputs.kernel_version }}-lts"
    runs-on: ubuntu-latest
    steps:
      - name: "Free up disk space"
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL \
            /usr/share/swift /usr/local/.ghcup
          sudo apt-get clean
          df -h

      - name: "Clone target repo (LuminaireKernel)"
        run: |
          BRANCH="${{ inputs.android_version }}-${{ inputs.kernel_version }}-lts"
          REPO="LuminaireKernel-${{ inputs.kernel_version }}-lts"
          echo "TARGET_BRANCH=${BRANCH}" >> $GITHUB_ENV
          echo "TARGET_REPO=${REPO}" >> $GITHUB_ENV

          git clone --branch "${BRANCH}" \
            "https://chainonyourdoor:${{ secrets.SYNC_TOKEN }}@github.com/chainonyourdoor/${REPO}.git" \
            kernel-work
          cd kernel-work
          git config user.name "chainonyourdoor"
          git config user.email "chainonyourdoor@gmail.com"

      - name: "Fetch live ACK history"
        run: |
          cd kernel-work
          ACK_BRANCH="${{ inputs.android_version }}-${{ inputs.kernel_version }}-lts"
          git remote add ack-live "https://android.googlesource.com/kernel/common"

          # Progressive deepen: start at 2000 commits, grow if the merge-base
          # isn't found yet (skip this loop if force_adopt is explicitly true).
          DEPTH=2000
          git fetch ack-live "${ACK_BRANCH}" --depth="${DEPTH}"

          if [ "${{ inputs.force_adopt }}" != "true" ]; then
            for i in 1 2 3; do
              if git merge-base HEAD ack-live/FETCH_HEAD >/dev/null 2>&1 || \
                 git merge-base HEAD FETCH_HEAD >/dev/null 2>&1; then
                echo "Merge-base found at depth ${DEPTH} ✅"
                break
              fi
              DEPTH=$((DEPTH * 2))
              echo "No merge-base yet, deepening to ${DEPTH}..."
              git fetch ack-live "${ACK_BRANCH}" --depth="${DEPTH}"
            done
          fi

      - name: "Sync branch to live ACK"
        run: |
          cd kernel-work
          if git merge-base HEAD FETCH_HEAD >/dev/null 2>&1; then
            echo "Shared history found — fast-forwarding to live ACK"
            git merge --ff-only FETCH_HEAD
          else
            if [ "${{ inputs.force_adopt }}" = "true" ]; then
              echo "No shared history (expected on first run) — adopting live ACK as new base"
              git reset --hard FETCH_HEAD
            else
              echo "::error::No shared history with live ACK and force_adopt=false. Re-run with force_adopt=true if this is the first sync, or investigate why history diverged."
              exit 1
            fi
          fi

          VERSION=$(grep '^VERSION = ' Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep '^PATCHLEVEL = ' Makefile | awk '{print $3}')
          SUBLEVEL=$(grep '^SUBLEVEL = ' Makefile | awk '{print $3}')
          echo "Synced to ACK ${VERSION}.${PATCHLEVEL}.${SUBLEVEL}"

      - name: "Catch-up merge to linux-stable tag"
        if: ${{ inputs.target_stable_tag != '' }}
        run: |
          cd kernel-work
          git remote add stable "https://github.com/gregkh/linux.git"

          DEPTH=2000
          git fetch stable "refs/tags/${{ inputs.target_stable_tag }}:refs/tags/${{ inputs.target_stable_tag }}" --depth="${DEPTH}"

          for i in 1 2 3; do
            if git merge-base HEAD "${{ inputs.target_stable_tag }}" >/dev/null 2>&1; then
              echo "Merge-base with linux-stable found at depth ${DEPTH} ✅"
              break
            fi
            DEPTH=$((DEPTH * 2))
            echo "No merge-base yet, deepening to ${DEPTH}..."
            git fetch stable "refs/tags/${{ inputs.target_stable_tag }}:refs/tags/${{ inputs.target_stable_tag }}" --depth="${DEPTH}"
          done

          if ! git merge-base HEAD "${{ inputs.target_stable_tag }}" >/dev/null 2>&1; then
            echo "::error::No shared history with linux-stable even at depth ${DEPTH}. Can't do a clean 3-way merge — investigate manually."
            exit 1
          fi

          # On conflict, this job FAILS on purpose — kernel source merge
          # conflicts need human judgment, not CI auto-resolve. Resolve
          # locally, then commit+push from there.
          if ! git merge --no-edit "${{ inputs.target_stable_tag }}"; then
            echo "::error::Merge conflict catching up to ${{ inputs.target_stable_tag }}. Resolve manually: git clone the repo, replicate these fetch steps, resolve conflicts locally, then push."
            git merge --abort
            exit 1
          fi

          VERSION=$(grep '^VERSION = ' Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep '^PATCHLEVEL = ' Makefile | awk '{print $3}')
          SUBLEVEL=$(grep '^SUBLEVEL = ' Makefile | awk '{print $3}')
          echo "Caught up to ${VERSION}.${PATCHLEVEL}.${SUBLEVEL} (target: ${{ inputs.target_stable_tag }})"

      - name: "Push"
        run: |
          cd kernel-work
          if [ "${{ inputs.force_adopt }}" = "true" ]; then
            git push origin "${TARGET_BRANCH}" --force
          else
            git push origin "${TARGET_BRANCH}"
          fi
          echo "Pushed ${TARGET_REPO}@${TARGET_BRANCH}"
