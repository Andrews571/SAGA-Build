name: "🌀 Upstream Kernel Sync"
run-name: "${{ inputs.android_version }} | ${{ inputs.kernel_version }}-lts"

# The target repo (LuminaireKernel-{version}) keeps real git history, so it
# can be merged against linux-stable to catch up on subversions ACK hasn't
# merged yet.
#
# IMPORTANT: never rewrite commits from this history (no filter-repo,
# filter-branch, rebase, etc). A previous version of this workflow used
# git-filter-repo to work around a shallow-push failure during adopt, which
# silently rewrote every commit hash. That broke merge-base lookups against
# real ACK/linux-stable forever after, since our commits no longer matched
# their originals byte-for-byte. Real, unmodified commit identity is the
# entire point of this repo — it's what lets a future merge with a
# linux-stable tag find a genuine shared ancestor.
#
# Manual only for now (workflow_dispatch, no cron) — merge conflicts here
# need human judgment, not something safe to auto-resolve in CI.

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel version (e.g. 6.1)"
        type: string
        default: "6.1"
      android_version:
        description: "Android version tag (e.g. android14)"
        type: string
        default: "android14"
      target_stable_tag:
        description: "linux-stable tag to catch up to (e.g. v6.1.177). Leave empty to only sync with ACK."
        type: string
        default: ""
      force_adopt:
        description: "Adopt live ACK as a fresh base via a clean clone + force-push (normally only needed once, on the first run, or if history has diverged)"
        type: boolean
        default: false

jobs:
  upstream-sync:
    name: "Sync ${{ inputs.android_version }}-${{ inputs.kernel_version }}-lts"
    runs-on: ubuntu-latest
    steps:
      - name: "Free up disk space"
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL \
            /usr/share/swift /usr/local/.ghcup
          sudo apt-get clean
          df -h

      - name: "Resolve target repo/branch"
        run: |
          echo "TARGET_BRANCH=${{ inputs.android_version }}-${{ inputs.kernel_version }}-lts" >> $GITHUB_ENV
          echo "TARGET_REPO=LuminaireKernel-${{ inputs.kernel_version }}" >> $GITHUB_ENV

      # force_adopt path: a shallow clone direct from live ACK, pushed with
      # --no-thin. Two prior attempts each failed differently:
      #   - shallow clone/fetch, default (thin) push -> "did not receive
      #     expected object" (git assumed the remote already had certain
      #     base objects for its delta-compressed pack; it didn't)
      #   - full (non-shallow) clone -> 12M+ objects, push too large,
      #     GitHub's server errored (HTTP 500) trying to process it
      # --no-thin forces every object the push needs to be sent explicitly
      # instead of delta-compressed against objects assumed to already
      # exist on the remote, which is the documented cause of the first
      # failure mode. Kept shallow (depth=100) to stay clear of the second.
      - name: "Adopt live ACK (shallow clone, no-thin push)"
        if: ${{ inputs.force_adopt == true }}
        run: |
          ACK_BRANCH="${{ inputs.android_version }}-${{ inputs.kernel_version }}-lts"

          git clone --depth=100 --branch "${ACK_BRANCH}" --progress \
            "https://android.googlesource.com/kernel/common" ack-fresh
          cd ack-fresh
          git config user.name "chainonyourdoor"
          git config user.email "chainonyourdoor@gmail.com"

          git remote add target \
            "https://chainonyourdoor:${{ secrets.SYNC_TOKEN }}@github.com/chainonyourdoor/${TARGET_REPO}.git"
          git push --no-thin target "HEAD:${TARGET_BRANCH}" --force

          VERSION=$(grep '^VERSION = ' Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep '^PATCHLEVEL = ' Makefile | awk '{print $3}')
          SUBLEVEL=$(grep '^SUBLEVEL = ' Makefile | awk '{print $3}')
          echo "Adopted live ACK ${VERSION}.${PATCHLEVEL}.${SUBLEVEL} as new base for ${TARGET_REPO}@${TARGET_BRANCH}"

      # Everything below only runs when NOT adopting — normal incremental
      # sync against a target repo that already has real ACK history.
      - name: "Clone target repo (LuminaireKernel)"
        if: ${{ inputs.force_adopt == false }}
        run: |
          REPO_URL="https://chainonyourdoor:${{ secrets.SYNC_TOKEN }}@github.com/chainonyourdoor/${TARGET_REPO}.git"
          git clone --branch "${TARGET_BRANCH}" "${REPO_URL}" kernel-work || {
            echo "::error::Clone failed. If ${TARGET_BRANCH} doesn't exist yet on ${TARGET_REPO}, re-run with force_adopt=true first."
            exit 1
          }
          cd kernel-work
          git config user.name "chainonyourdoor"
          git config user.email "chainonyourdoor@gmail.com"

      - name: "Fetch + fast-forward to live ACK"
        if: ${{ inputs.force_adopt == false }}
        run: |
          cd kernel-work
          ACK_BRANCH="${{ inputs.android_version }}-${{ inputs.kernel_version }}-lts"
          git remote add ack-live "https://android.googlesource.com/kernel/common"

          # Small depth is enough here: this only needs to reach commits
          # newer than our current tip, which — since our tip already IS a
          # real ACK commit — should be very close by.
          DEPTH=50
          git fetch ack-live "${ACK_BRANCH}" --depth="${DEPTH}" --progress

          for i in 1 2 3; do
            if git merge-base HEAD FETCH_HEAD >/dev/null 2>&1; then
              echo "Merge-base found at depth ${DEPTH} ✅"
              break
            fi
            DEPTH=$((DEPTH * 2))
            echo "No merge-base yet, deepening to ${DEPTH}..."
            git fetch ack-live "${ACK_BRANCH}" --depth="${DEPTH}" --progress
          done

          if ! git merge-base HEAD FETCH_HEAD >/dev/null 2>&1; then
            echo "::error::No shared history with live ACK even at depth ${DEPTH}. If history has genuinely diverged (e.g. this repo's history was rewritten), re-run with force_adopt=true to re-adopt live ACK as a fresh base."
            exit 1
          fi

          git merge --ff-only FETCH_HEAD

          VERSION=$(grep '^VERSION = ' Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep '^PATCHLEVEL = ' Makefile | awk '{print $3}')
          SUBLEVEL=$(grep '^SUBLEVEL = ' Makefile | awk '{print $3}')
          echo "Synced to ACK ${VERSION}.${PATCHLEVEL}.${SUBLEVEL}"

      - name: "Catch-up merge to linux-stable tag"
        if: ${{ inputs.force_adopt == false && inputs.target_stable_tag != '' }}
        run: |
          cd kernel-work
          git remote add stable "https://github.com/gregkh/linux.git"

          DEPTH=100
          git fetch stable "refs/tags/${{ inputs.target_stable_tag }}:refs/tags/${{ inputs.target_stable_tag }}" --depth="${DEPTH}" --progress

          for i in 1 2 3; do
            if git merge-base HEAD "${{ inputs.target_stable_tag }}" >/dev/null 2>&1; then
              echo "Merge-base with linux-stable found at depth ${DEPTH} ✅"
              break
            fi
            DEPTH=$((DEPTH * 2))
            echo "No merge-base yet, deepening to ${DEPTH}..."
            git fetch stable "refs/tags/${{ inputs.target_stable_tag }}:refs/tags/${{ inputs.target_stable_tag }}" --depth="${DEPTH}" --progress
          done

          if ! git merge-base HEAD "${{ inputs.target_stable_tag }}" >/dev/null 2>&1; then
            echo "::error::No shared history with linux-stable even at depth ${DEPTH}. Can't do a clean 3-way merge — investigate manually."
            exit 1
          fi

          # On conflict, this job FAILS on purpose — kernel source merge
          # conflicts need human judgment, not CI auto-resolve. Resolve
          # locally, then commit+push from there.
          if ! git merge --no-edit "${{ inputs.target_stable_tag }}"; then
            echo "::error::Merge conflict catching up to ${{ inputs.target_stable_tag }}. Resolve manually: git clone the repo, replicate these fetch steps, resolve conflicts locally, then push."
            git merge --abort
            exit 1
          fi

          VERSION=$(grep '^VERSION = ' Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep '^PATCHLEVEL = ' Makefile | awk '{print $3}')
          SUBLEVEL=$(grep '^SUBLEVEL = ' Makefile | awk '{print $3}')
          echo "Caught up to ${VERSION}.${PATCHLEVEL}.${SUBLEVEL} (target: ${{ inputs.target_stable_tag }})"

      - name: "Push"
        if: ${{ inputs.force_adopt == false }}
        run: |
          cd kernel-work
          git push origin "${TARGET_BRANCH}"
          echo "Pushed ${TARGET_REPO}@${TARGET_BRANCH}"
