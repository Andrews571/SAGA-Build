name: "✨ Luminaire Protocol"

on:
  workflow_dispatch:

env:
  DEBIAN_FRONTEND: noninteractive

jobs:

  build:
    name: "✨ Build Luminaire Protocol"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PERSONAL_TOKEN:           ${{ secrets.PERSONAL_TOKEN }}
      TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID_BUILD: ${{ secrets.TELEGRAM_THREAD_ID_BUILD }}
      TELEGRAM_THREAD_ID_LOG:   ${{ secrets.TELEGRAM_THREAD_ID_LOG }}

    steps:
      - name: "🌀 Clone LuminaireProtocol"
        run: |
          git clone --filter=blob:none \
            "https://x-access-token:${PERSONAL_TOKEN}@github.com/chainonyourdoor/LuminaireProtocol" \
            .

      - name: "🧰 Setup Swap Space"
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-size-gb: 10

      - name: "♻️ Restore Bazel cache"
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/bazel
          key: bazel-cache-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: bazel-cache-${{ github.ref_name }}-

      - name: "♻️ Restore LD cache"
        uses: actions/cache/restore@v5
        with:
          path: ~/.ld_cache
          key: ld-cache-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: ld-cache-${{ github.ref_name }}-

      - name: "📦 Install Dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison flex libssl-dev libelf-dev \
            dwarves cpio git curl wget zip patch rsync \
            aria2 pigz python3 perl

      - name: "✨ Build"
        run: bash build.sh

      - name: "📤 Upload AnyKernel3"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LuminaireProtocol-AnyKernel3
          path: /tmp/LuminaireProtocol-*.zip
          if-no-files-found: ignore

      - name: "💾 Save Bazel cache"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/bazel
          key: bazel-cache-${{ github.ref_name }}-${{ github.run_id }}

      - name: "💾 Save LD cache"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ~/.ld_cache
          key: ld-cache-${{ github.ref_name }}-${{ github.run_id }}

      - name: "🧹 Cleanup old caches"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          cleanup_cache() {
            local PREFIX="$1"
            local CURRENT_KEY="$2"
            local CACHES
            CACHES=$(gh api \
              "/repos/${{ github.repository }}/actions/caches?per_page=100" \
              --jq ".actions_caches[] | select(.key | startswith(\"${PREFIX}\")) | select(.key != \"${CURRENT_KEY}\") | .id")
            if [ -n "$CACHES" ]; then
              for ID in $CACHES; do
                gh api --method DELETE "/repos/${{ github.repository }}/actions/caches/${ID}" || true
              done
            fi
          }
          cleanup_cache "bazel-cache-${{ github.ref_name }}-" "bazel-cache-${{ github.ref_name }}-${{ github.run_id }}"
          cleanup_cache "ld-cache-${{ github.ref_name }}-" "ld-cache-${{ github.ref_name }}-${{ github.run_id }}"
