name: "✨ Luminaire Protocol"

on:
  workflow_dispatch:

env:
  DEBIAN_FRONTEND: noninteractive

jobs:

  build:
    name: "✨ Build Luminaire Protocol"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PERSONAL_TOKEN:           ${{ secrets.PERSONAL_TOKEN }}
      TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID_BUILD: ${{ secrets.TELEGRAM_THREAD_ID_BUILD }}
      TELEGRAM_THREAD_ID_LOG:   ${{ secrets.TELEGRAM_THREAD_ID_LOG }}
      USE_KERNEL_CACHE:         "true"
      USE_CLANG_CACHE:          "true"
      USE_AK3_CACHE:            "true"
      CCACHE_DIR:               ${{ github.workspace }}/.ccache

    steps:
      - name: "🌀 Clone LuminaireProtocol"
        run: |
          git clone --filter=blob:none \
            "https://x-access-token:${PERSONAL_TOKEN}@github.com/chainonyourdoor/LuminaireProtocol" \
            .

      - name: "♻️ Restore ccache"
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: ccache-${{ github.ref_name }}-

      - name: "♻️ Restore Greenforce Clang"
        uses: actions/cache/restore@v5
        with:
          path: ~/clang-cache
          key: clang-greenforce-${{ github.ref_name }}

      - name: "♻️ Restore kernel source"
        uses: actions/cache/restore@v5
        with:
          path: ~/kernel-cache
          key: kernel-src-${{ github.ref_name }}

      - name: "♻️ Restore AnyKernel3"
        uses: actions/cache/restore@v5
        with:
          path: ~/ak3-cache
          key: ak3-${{ github.ref_name }}

      - name: "✨ Build"
        run: bash build.sh


      - name: "💾 Save ccache"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ github.ref_name }}-${{ github.run_id }}

      - name: "💾 Save Greenforce Clang"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ~/clang-cache
          key: clang-greenforce-${{ github.ref_name }}

      - name: "💾 Save kernel source"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ~/kernel-cache
          key: kernel-src-${{ github.ref_name }}

      - name: "💾 Save AnyKernel3"
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ~/ak3-cache
          key: ak3-${{ github.ref_name }}

      - name: "🧹 Cleanup old caches"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          cleanup_cache() {
            local PREFIX="$1"
            local CURRENT_KEY="$2"
            local CACHES
            CACHES=$(gh api \
              "/repos/${{ github.repository }}/actions/caches?per_page=100" \
              --jq ".actions_caches[] | select(.key | startswith(\"${PREFIX}\")) | select(.key != \"${CURRENT_KEY}\") | .id")
            if [ -n "$CACHES" ]; then
              for ID in $CACHES; do
                gh api --method DELETE "/repos/${{ github.repository }}/actions/caches/${ID}" || true
              done
            fi
          }
          cleanup_cache "ccache-${{ github.ref_name }}-" "ccache-${{ github.ref_name }}-${{ github.run_id }}"
