name: "🔥 Cache Warming"

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Variant"
        type: choice
        default: "VANILLA"
        options:
          - "VANILLA"
      android_version:
        description: "Android Version"
        type: choice
        default: "android14"
        options:
          - "android13"
          - "android14"
          - "android15"
          - "android16"
      kernel_version:
        description: "Kernel Version"
        type: choice
        default: "6.1"
        options:
          - "5.10"
          - "5.15"
          - "6.1"
          - "6.6"
          - "6.12"
      update_arsenal:
        description: "Refresh Arsenal"
        type: choice
        default: "no"
        options:
          - "yes"
          - "no"
      enable_lto:
        description: "⚠️ LTO"
        type: choice
        default: "THIN"
        options:
          - "NONE"
          - "THIN"

jobs:
  Luminaire:
    uses: ./.github/workflows/kernel-build.yml
    with:
      variant:         ${{ inputs.variant }}
      android_version: ${{ inputs.android_version }}
      kernel_version:  ${{ inputs.kernel_version }}
      update_arsenal:  ${{ inputs.update_arsenal }}
      enable_lto:      ${{ inputs.enable_lto }}
      warming_mode:    "true"
    secrets:
      PERSONAL_TOKEN:           ${{ secrets.PERSONAL_TOKEN }}
      TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID_BUILD: ${{ secrets.TELEGRAM_THREAD_ID_BUILD }}
      TELEGRAM_THREAD_ID_LOG:   ${{ secrets.TELEGRAM_THREAD_ID_LOG }}
