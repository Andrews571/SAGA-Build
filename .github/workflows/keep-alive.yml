name: "🫀 Keep Cache Alive"

on:
  schedule:
    - cron: "0 0 */5 * *"
  workflow_dispatch:

jobs:
  # ======================================================
  # LIST — enumerate every arsenal-*/clang-* cache that actually exists
  # ======================================================
  # A plain `restore-keys: arsenal-` only restores (and thus only refreshes
  # the last-accessed time of) the single most recent matching cache, not
  # every cache under that prefix. With one arsenal/clang cache per
  # kernel-version x build-system x branch combination, that left every
  # other combination's cache un-touched and still eligible for GitHub's
  # 7-day unused-cache eviction despite this job "running". Listing the
  # real cache keys via the REST API and fanning out a restore per key
  # (below) actually touches all of them.
  list-caches:
    name: "List Cache Keys"
    runs-on: ubuntu-latest
    outputs:
      keys: ${{ steps.list.outputs.keys }}
    steps:
      - name: "List arsenal-*/clang-* cache keys"
        id: list
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          KEYS=$(gh api "/repos/${{ github.repository }}/actions/caches?per_page=100" --paginate \
            | jq -s '[.[].actions_caches[]?.key] | map(select(startswith("arsenal-") or startswith("clang-"))) | unique')
          echo "Found $(echo "$KEYS" | jq 'length') cache(s) to keep alive:"
          echo "$KEYS" | jq -r '.[]'
          echo "keys=$(echo "$KEYS" | jq -c .)" >> "$GITHUB_OUTPUT"

  # ======================================================
  # TOUCH — one restore per real key, refreshes its last-accessed time
  # ======================================================
  touch-caches:
    name: "Touch ${{ matrix.key }}"
    needs: list-caches
    if: needs.list-caches.outputs.keys != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        key: ${{ fromJson(needs.list-caches.outputs.keys) }}
    steps:
      - name: "♻️ Restore (touch) ${{ matrix.key }}"
        uses: actions/cache/restore@v6
        with:
          # Dummy path — we only care about the restore hit bumping the
          # cache's last-accessed timestamp server-side, not the extracted
          # contents (which are discarded when the runner is torn down).
          path: /tmp/keep-alive-dummy
          key: ${{ matrix.key }}
