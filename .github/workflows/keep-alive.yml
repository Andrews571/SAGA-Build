name: "🫀 Keep Cache Alive"

on:
  schedule:
    - cron: "0 0 */5 * *"
  workflow_dispatch:

jobs:
  keep-alive:
    name: "🫀 Touch All Caches"
    runs-on: ubuntu-latest

    steps:
      - name: "♻️ Touch arsenal"
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/clang-cache
            ~/ccache-bin
            ~/ak3-cache
            ~/kernel-cache
            ~/.apt-cache
          key: arsenal-__keepalive__
          restore-keys: arsenal-

      - name: "♻️ Touch ccache (GH Release)"
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          for asset in $(gh release view cache \
            --repo "${{ github.repository }}" \
            --json assets --jq '.assets[].name' 2>/dev/null || true); do
            gh release download cache \
              --repo "${{ github.repository }}" \
              --pattern "$asset" \
              --dir /tmp/ 2>/dev/null || true
            rm -f "/tmp/${asset}"
          done
          echo "ccache assets touched ✅"
