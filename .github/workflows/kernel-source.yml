name: "🌱 Kernel Source"
run-name: "${{ inputs.force_adopt && format('🌊 Adopt fresh ACK | {0}-{1}-lts', inputs.android_version, inputs.kernel_version) || (inputs.target_stable_tag != '' && format('⚡ Catch-up | {0} | {1}-{2}-lts', inputs.target_stable_tag, inputs.android_version, inputs.kernel_version) || format('🌀 Sync live ACK | {0}-{1}-lts', inputs.android_version, inputs.kernel_version)) }}"

# The target repo (LuminaireKernel-{version}) keeps real git history, so it
# can be merged against linux-stable to catch up on subversions ACK hasn't
# merged yet.
#
# IMPORTANT: never rewrite commits from this history (no filter-repo,
# filter-branch, rebase, etc). A previous version of this workflow used
# git-filter-repo to work around a shallow-push failure during adopt, which
# silently rewrote every commit hash. That broke merge-base lookups against
# real ACK/linux-stable forever after, since our commits no longer matched
# their originals byte-for-byte. Real, unmodified commit identity is the
# entire point of this repo — it's what lets a future merge with a
# linux-stable tag find a genuine shared ancestor.
#
# Manual only for now (workflow_dispatch, no cron) — merge conflicts here
# need human judgment, not something safe to auto-resolve in CI.

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel version (e.g. 6.1)"
        type: string
        default: "6.1"
      android_version:
        description: "Android version tag (e.g. android14)"
        type: string
        default: "android14"
      target_stable_tag:
        description: "linux-stable tag to catch up to (e.g. v6.1.177). Leave empty to only sync with ACK."
        type: string
        default: ""
      force_adopt:
        description: "Adopt live ACK as a fresh base via a clean clone + force-push (normally only needed once, on the first run, or if history has diverged)"
        type: boolean
        default: false

jobs:
  upstream-sync:
    name: "Sync ${{ inputs.android_version }}-${{ inputs.kernel_version }}-lts"
    runs-on: ubuntu-latest
    steps:
      - name: "Free up disk space"
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL \
            /usr/share/swift /usr/local/.ghcup
          sudo apt-get clean
          df -h

      - name: "Resolve target repo/branch"
        run: |
          echo "TARGET_BRANCH=${{ inputs.android_version }}-${{ inputs.kernel_version }}-lts" >> $GITHUB_ENV
          echo "TARGET_REPO=LuminaireKernel-${{ inputs.kernel_version }}" >> $GITHUB_ENV

          # A stable catch-up merge (target_stable_tag set, not adopting)
          # never lands directly on the production branch — it goes to a
          # "-staging" branch instead, so a merge that turns out to have
          # subtle problems (something a green CI run doesn't catch) never
          # touches what LuminaireProtocol actually builds from. Plain ACK
          # fast-forward syncs (no stable tag) and adopt both still push
          # straight to the real branch — those aren't introducing new,
          # unvalidated content the way a raw stable-tag merge is.
          if [ "${{ inputs.force_adopt }}" = "false" ] && [ -n "${{ inputs.target_stable_tag }}" ]; then
            echo "PUSH_BRANCH=${{ inputs.android_version }}-${{ inputs.kernel_version }}-lts-staging" >> $GITHUB_ENV
          else
            echo "PUSH_BRANCH=${{ inputs.android_version }}-${{ inputs.kernel_version }}-lts" >> $GITHUB_ENV
          fi

      # force_adopt path: full (non-shallow) clone from live ACK, pushed as
      # many small sequential checkpoints instead of one giant push.
      #
      # Three prior attempts, in order:
      #   1. shallow clone/fetch, default (thin) push -> "did not receive
      #      expected object" (git assumed the remote already had certain
      #      base objects for its delta-compressed pack; it didn't)
      #   2. shallow clone (depth=100) + --no-thin push -> same
      #      "did not receive expected object" error again. --no-thin alone
      #      doesn't fix this class of failure.
      #   3. full (non-shallow) clone, single push -> clone itself succeeds
      #      (12M+ objects), but the push is too large in one shot and
      #      GitHub's server errors (HTTP 500) trying to process it.
      #
      # A shallow adopt was never actually viable here regardless of the
      # push errors above: this repo's whole point is a future 3-way merge
      # against a linux-stable tag, which needs `git merge-base` to walk
      # back to a real shared ancestor. A 1-commit (or depth=N, N small)
      # history has no ancestors to walk back to, so that merge-base would
      # never be found. Full history is a hard requirement, not a nice-to-
      # have — so the fix has to be "push the full thing safely", not
      # "push less".
      #
      # The actual fix: GitHub's own docs for the 2 GiB push limit
      # (https://docs.github.com/en/get-started/using-git/troubleshooting-the-2-gb-push-limit)
      # recommend pushing checkpoint commits spread across history one at a
      # time, oldest to newest, so each individual push stays small and the
      # remote genuinely already has the previous checkpoint's objects
      # (not just assumed to, like the thin-pack failure above). This also
      # incidentally sidesteps failure mode #1/#2, since every push here is
      # a small, self-contained, non-thin-dependent pack.
      #
      # The step size below is adaptive rather than a fixed guess: it halves
      # on any push failure and retries from the last successful checkpoint,
      # per GitHub's own suggestion to shrink the step size on failure. This
      # avoids having to know the "right" number in advance for a repo this
      # size, where commit sizes aren't uniform (some merges touch far more
      # objects than others).
      - name: "Adopt live ACK (full clone, adaptive chunked push)"
        if: ${{ inputs.force_adopt == true }}
        run: |
          ACK_BRANCH="${{ inputs.android_version }}-${{ inputs.kernel_version }}-lts"

          git clone --branch "${ACK_BRANCH}" --progress \
            "https://android.googlesource.com/kernel/common" ack-fresh
          cd ack-fresh
          git config user.name "chainonyourdoor"
          git config user.email "chainonyourdoor@gmail.com"

          # Large-push hardening: works around the known GitHub HTTP/2
          # large-pack corruption class of issues, and gives enough buffer
          # for multi-hundred-MB chunks over HTTP.
          git config http.postBuffer 524288000
          git config http.version HTTP/1.1

          git remote add target \
            "https://chainonyourdoor:${{ secrets.SYNC_TOKEN }}@github.com/chainonyourdoor/${TARGET_REPO}.git"

          echo "Building commit list (oldest -> newest)..."
          git rev-list --reverse HEAD > /tmp/commits.txt
          TOTAL=$(wc -l < /tmp/commits.txt)
          echo "Total commits to push: ${TOTAL}"

          echo "Baseline local repo size (for reference only, not per-chunk):"
          git count-objects -vH

          # Numeric (KiB) version, used to derive an avg bytes/object ratio
          # for estimating per-chunk size below. -H's human units (GiB/MiB)
          # aren't reliably parseable back into a number.
          BASELINE_INPACK=$(git count-objects -v | awk -F': ' '/^in-pack/{print $2}')
          BASELINE_SIZEPACK_KIB=$(git count-objects -v | awk -F': ' '/^size-pack/{print $2}')
          AVG_BYTES_PER_OBJ=$(awk -v s="$BASELINE_SIZEPACK_KIB" -v n="$BASELINE_INPACK" 'BEGIN{ if (n>0) printf "%.2f", (s*1024)/n; else print 0 }')
          echo "Avg bytes/object (baseline): ${AVG_BYTES_PER_OBJ}"

          idx=0
          # 100k commits ≈ 379 MiB at this repo's measured ~3.885 KiB/commit
          # average (777 KiB / 200 commits, derived from the real
          # size-pack/object-count baseline) — about 18.5% of GitHub's 2 GiB
          # push limit, leaving >5x headroom for a checkpoint that happens
          # to land on an unusually dense range of merge commits. The
          # auto-halving below is the actual safety net either way; this
          # number is just a starting point picked to minimize how often
          # that halving needs to kick in.
          step=100000
          min_step=1
          fails_at_min=0

          while [ "$idx" -lt "$TOTAL" ]; do
            target_idx=$(( idx + step ))
            if [ "$target_idx" -gt "$TOTAL" ]; then
              target_idx=$TOTAL
            fi

            commit_sha=$(awk -v n="$target_idx" 'NR==n{print; exit}' /tmp/commits.txt)
            echo "Pushing checkpoint ${target_idx}/${TOTAL} (${commit_sha}), step=${step}..."

            success=0
            push_size="n/a"
            for attempt in 1 2 3; do
              push_log=$(git push --no-thin target "${commit_sha}:refs/heads/${TARGET_BRANCH}" --force 2>&1)
              push_exit=$?
              echo "$push_log"
              if [ "$push_exit" -eq 0 ]; then
                success=1
                # Deliberately NOT parsing the live "Writing objects: X%"
                # meter here — without a tty, git prints every percentage
                # tick as its own line instead of overwriting one line, and
                # a prior version of this script raced trying to grab the
                # final one, ending up with the first (0%) tick instead.
                # The "Total N (delta M)..." summary line is printed exactly
                # once, after the push fully completes, so it can't race.
                # It only has object counts, not bytes, so bytes are
                # estimated from the baseline bytes/object ratio above.
                obj_count=$(echo "$push_log" | grep -oE "^Total [0-9]+" | awk '{print $2}')
                if [ -n "$obj_count" ]; then
                  push_size=$(awk -v o="$obj_count" -v b="$AVG_BYTES_PER_OBJ" 'BEGIN{
                    bytes = o * b
                    if (bytes >= 1048576) printf "%d objects (~%.2f MiB est.)", o, bytes/1048576
                    else printf "%d objects (~%.1f KiB est.)", o, bytes/1024
                  }')
                fi
                break
              fi
              echo "Push attempt ${attempt} failed, retrying in 5s..."
              sleep 5
            done

            if [ "$success" -eq 1 ]; then
              chunk_commits=$(( target_idx - idx ))
              echo "Checkpoint ${target_idx}/${TOTAL} OK — ${chunk_commits} commits — ${push_size}"
              idx=$target_idx
              fails_at_min=0
            elif [ "$step" -le "$min_step" ]; then
              fails_at_min=$((fails_at_min + 1))
              echo "Still failing at minimum step size (attempt ${fails_at_min}/3) on commit ${commit_sha}..."
              if [ "$fails_at_min" -ge 3 ]; then
                echo "::error::Push failed repeatedly even at step=1, at commit ${commit_sha} (checkpoint ${target_idx}/${TOTAL}). This is no longer a chunk-size problem — investigate manually (network, auth token, or an actually oversized single commit)."
                exit 1
              fi
            else
              step=$(( step / 2 ))
              if [ "$step" -lt "$min_step" ]; then
                step=$min_step
              fi
              echo "Push failed — reducing step size to ${step} and retrying from checkpoint ${idx}..."
            fi
          done

          echo "All checkpoints pushed. Confirming final HEAD is in place..."
          git push --no-thin target "HEAD:refs/heads/${TARGET_BRANCH}" --force

          VERSION=$(grep '^VERSION = ' Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep '^PATCHLEVEL = ' Makefile | awk '{print $3}')
          SUBLEVEL=$(grep '^SUBLEVEL = ' Makefile | awk '{print $3}')
          echo "Adopted live ACK ${VERSION}.${PATCHLEVEL}.${SUBLEVEL} as new base for ${TARGET_REPO}@${TARGET_BRANCH} (full history, ${TOTAL} commits)"

      # Everything below only runs when NOT adopting — normal incremental
      # sync against a target repo that already has real ACK history.
      - name: "Clone target repo (LuminaireKernel)"
        if: ${{ inputs.force_adopt == false }}
        run: |
          REPO_URL="https://chainonyourdoor:${{ secrets.SYNC_TOKEN }}@github.com/chainonyourdoor/${TARGET_REPO}.git"
          # Shallow, not a full clone: the target repo now holds real,
          # complete ACK history (millions of commits after the adopt step),
          # and a routine incremental sync only ever needs recent history to
          # fast-forward/merge from. If a later step needs more depth than
          # this to find a merge-base, it deepens this same local clone with
          # `git fetch origin --deepen=N` rather than starting over.
          #
          # NOTE: shallow here is NOT safe to push from directly. An earlier
          # version of this comment assumed it was ("the remote branch here
          # is never empty, so none of the earlier 'did not receive expected
          # object' issues apply") — that assumption is wrong. Once the
          # "Fetch + fast-forward to live ACK" step merges in commits from a
          # *different* remote (ack-live/AOSP), the local object graph no
          # longer lines up cleanly with what origin already has, and a
          # shallow push fails with the same "did not receive expected
          # object" error as the adopt case. The Push step below unshallows
          # first to fix this.
          #
          # Try PUSH_BRANCH first (the staging branch, when catching up to a
          # stable tag) — it may already exist from a previous catch-up
          # attempt on this same tag/version. If it doesn't exist yet, fall
          # back to cloning TARGET_BRANCH (production) as the starting point
          # instead; the eventual push still goes to PUSH_BRANCH, so this
          # effectively creates the staging branch as a copy of production
          # plus whatever gets merged on top in the steps below.
          if git clone --branch "${PUSH_BRANCH}" --depth=100 --progress "${REPO_URL}" kernel-work 2>/dev/null; then
            echo "Cloned existing ${PUSH_BRANCH} (continuing a prior catch-up attempt)"
          else
            echo "${PUSH_BRANCH} doesn't exist yet — cloning ${TARGET_BRANCH} as the starting point instead"
            git clone --branch "${TARGET_BRANCH}" --depth=100 --progress "${REPO_URL}" kernel-work || {
              echo "::error::Clone failed. If ${TARGET_BRANCH} doesn't exist yet on ${TARGET_REPO}, re-run with force_adopt=true first."
              exit 1
            }
          fi
          cd kernel-work
          git config user.name "chainonyourdoor"
          git config user.email "chainonyourdoor@gmail.com"

      - name: "Fetch + fast-forward to live ACK"
        if: ${{ inputs.force_adopt == false }}
        run: |
          cd kernel-work
          ACK_BRANCH="${{ inputs.android_version }}-${{ inputs.kernel_version }}-lts"
          git remote add ack-live "https://android.googlesource.com/kernel/common"

          # Small depth is enough here: this only needs to reach commits
          # newer than our current tip, which — since our tip already IS a
          # real ACK commit — should be very close by.
          DEPTH=50
          git fetch ack-live "${ACK_BRANCH}" --depth="${DEPTH}" --progress

          for i in 1 2 3; do
            if git merge-base HEAD FETCH_HEAD >/dev/null 2>&1; then
              echo "Merge-base found at depth ${DEPTH} ✅"
              break
            fi
            DEPTH=$((DEPTH * 2))
            echo "No merge-base yet, deepening to ${DEPTH}..."
            git fetch ack-live "${ACK_BRANCH}" --depth="${DEPTH}" --progress
          done

          if ! git merge-base HEAD FETCH_HEAD >/dev/null 2>&1; then
            echo "::error::No shared history with live ACK even at depth ${DEPTH}. If history has genuinely diverged (e.g. this repo's history was rewritten), re-run with force_adopt=true to re-adopt live ACK as a fresh base."
            exit 1
          fi

          git merge --ff-only FETCH_HEAD

          VERSION=$(grep '^VERSION = ' Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep '^PATCHLEVEL = ' Makefile | awk '{print $3}')
          SUBLEVEL=$(grep '^SUBLEVEL = ' Makefile | awk '{print $3}')
          echo "Synced to ACK ${VERSION}.${PATCHLEVEL}.${SUBLEVEL}"

      - name: "Catch-up merge to linux-stable tag"
        if: ${{ inputs.force_adopt == false && inputs.target_stable_tag != '' }}
        run: |
          cd kernel-work
          git remote add stable "https://github.com/gregkh/linux.git"

          # Deepens BOTH sides together each pass: our local clone (only
          # 100 commits deep from the "Clone target repo" step) and the
          # stable fetch. Deepening only the stable side isn't enough on
          # its own — if the actual shared ancestor with linux-stable is
          # further back than our local clone's own depth, no amount of
          # extra stable-side history will ever find it, since the missing
          # side is ours, not theirs.
          LOCAL_DEPTH=100
          STABLE_DEPTH=100
          git fetch stable "refs/tags/${{ inputs.target_stable_tag }}:refs/tags/${{ inputs.target_stable_tag }}" --depth="${STABLE_DEPTH}" --progress

          for i in 1 2 3; do
            if git merge-base HEAD "${{ inputs.target_stable_tag }}" >/dev/null 2>&1; then
              echo "Merge-base with linux-stable found (local depth ${LOCAL_DEPTH}, stable depth ${STABLE_DEPTH}) ✅"
              break
            fi
            LOCAL_DEPTH=$((LOCAL_DEPTH * 2))
            STABLE_DEPTH=$((STABLE_DEPTH * 2))
            echo "No merge-base yet, deepening local to ${LOCAL_DEPTH} and stable to ${STABLE_DEPTH}..."
            git fetch origin "${TARGET_BRANCH}" --deepen="${LOCAL_DEPTH}" --progress
            git fetch stable "refs/tags/${{ inputs.target_stable_tag }}:refs/tags/${{ inputs.target_stable_tag }}" --depth="${STABLE_DEPTH}" --progress
          done

          if ! git merge-base HEAD "${{ inputs.target_stable_tag }}" >/dev/null 2>&1; then
            echo "::error::No shared history with linux-stable even at local depth ${LOCAL_DEPTH} / stable depth ${STABLE_DEPTH}. Can't do a clean 3-way merge — investigate manually."
            exit 1
          fi

          # On conflict, this job FAILS on purpose — kernel source merge
          # conflicts need human judgment, not CI auto-resolve. Resolve
          # locally, then commit+push from there.
          if ! git merge --no-edit "${{ inputs.target_stable_tag }}"; then
            echo "::error::Merge conflict catching up to ${{ inputs.target_stable_tag }}. Resolve manually: git clone the repo, replicate these fetch steps, resolve conflicts locally, then push."
            git merge --abort
            exit 1
          fi

          VERSION=$(grep '^VERSION = ' Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep '^PATCHLEVEL = ' Makefile | awk '{print $3}')
          SUBLEVEL=$(grep '^SUBLEVEL = ' Makefile | awk '{print $3}')
          echo "Caught up to ${VERSION}.${PATCHLEVEL}.${SUBLEVEL} (target: ${{ inputs.target_stable_tag }})"

      - name: "Push"
        if: ${{ inputs.force_adopt == false }}
        run: |
          cd kernel-work
          # Unshallow before pushing: after the previous step fast-forwards
          # onto commits fetched from a different remote (ack-live/AOSP),
          # the local object graph doesn't line up cleanly with what origin
          # already has, so a shallow push fails with "did not receive
          # expected object". Full history relative to origin is required
          # for git to correctly compute what to send.
          git fetch origin --unshallow --progress

          # Explicit refspec, not just `git push origin ${PUSH_BRANCH}` —
          # the local branch name after "Clone target repo" could be either
          # PUSH_BRANCH or TARGET_BRANCH depending on which one existed to
          # clone, but the push destination is always PUSH_BRANCH.
          git push origin "HEAD:refs/heads/${PUSH_BRANCH}"
          echo "Pushed ${TARGET_REPO}@${PUSH_BRANCH}"
